name: Python Test

on:
  push:
    branches:
      - master
      - main


jobs:

  pytest:

    runs-on: ubuntu-latest


    services:

      mysql:

        image: mysql:8.0

        env:

          MYSQL_ROOT_PASSWORD: 123456
          MYSQL_DATABASE: user_test

        ports:
          - 3306:3306

        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -p123456"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5



    defaults:
      run:
        working-directory: backend



    steps:


      - name: Checkout Code
        uses: actions/checkout@v4



      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"



      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Allure
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip
          wget https://github.com/allure-framework/allure2/releases/download/2.35.0/allure-2.35.0.zip
          unzip allure-2.35.0.zip
          sudo mv allure-2.35.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      - name: Start FastAPI
        run: |
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 &


      - name: Run Pytest
        run: pytest
      
      - name: Generate Allure Report
        run: |
          allure generate report --clean -o allure-report
      
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: backend/allure-report